<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Budget Tracker</h1>
  </header>

  <main class="container">
    <section class="budget-section">
      <h2>Set Your Budget</h2>
      <input type="number" id="budgetInput" placeholder="Enter your budget" />
      <button id="setBudgetBtn">Set Budget</button>
      <p>Total Budget: <span id="budgetAmount">₹0</span></p>
    </section>

    <section class="expense-form">
      <h2>Add Expense</h2>
      <input type="number" id="expenseAmount" placeholder="Amount" >
      <input type="text" id="expenseCategory" placeholder="Category" >
      <input type="text" id="expenseDescription" placeholder="Description" >
      <input type="date" id="expenseDate" >
      <button id="addExpenseBtn">Add Expense</button>
    </section>

    <section class="summary">
      <h2>Summary</h2>
      <p>Total Expenses: <span id="totalExpenses">₹0</span></p>
      <p>Remaining: <span id="remaining">₹0</span></p>
    </section>

    <section class="expense-list">
      <h2>Expense History</h2>
      <div id="expenseList"></div>
    </section>
  </main>

  <footer>
    <p>© 2025 Budget Tracker App</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
